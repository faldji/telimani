version: "3.9"
services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telimani
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=telimani
      - DATABASE_URL=postgresql://postgres:password@db:5432/telimani
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:19000,http://localhost:8081
      - APP_URL=http://localhost:5000
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run dev"

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      - NODE_ENV=test
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=telimani_test
      - DATABASE_URL=postgresql://postgres:password@db:5432/telimani_test
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:19000,http://localhost:8081
      - APP_URL=http://localhost:5000
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run db:create:test && npm run db:migrate && npm test"
    profiles:
      - test

volumes:
  pgdata:
